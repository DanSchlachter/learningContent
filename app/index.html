<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning Content Management</title>
  <script id="sap-ui-bootstrap"
    src="https://ui5.sap.com/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"
    data-sap-ui-frameOptions="allow"
    data-sap-ui-libs="sap.m,sap.ui.core">
  </script>
  <script>
    sap.ui.getCore().attachInit(function () {
      sap.ui.require(["sap/m/Shell", "sap/m/App", "sap/m/Page", "sap/m/GenericTile", "sap/m/TileContent", "sap/m/ImageContent", "sap/m/FlexBox"], function (Shell, App, Page, GenericTile, TileContent, ImageContent, FlexBox) {

        var browseTile = new GenericTile({
          header: "Browse Content",
          subheader: "Discover published learning items",
          press: function () {
            window.location.href = "/browse/webapp/index.html";
          },
          tileContent: [new TileContent({
            content: new ImageContent({ src: "sap-icon://learning-assistant" })
          })]
        });

        var adminTile = new GenericTile({
          header: "Manage Content",
          subheader: "Admin: content, categories, tags",
          press: function () {
            window.location.href = "/admin/webapp/index.html";
          },
          tileContent: [new TileContent({
            content: new ImageContent({ src: "sap-icon://business-objects-experience" })
          })]
        });

        var tileBox = new FlexBox({
          wrap: "Wrap",
          justifyContent: "Center",
          items: [browseTile, adminTile]
        }).addStyleClass("sapUiSmallMargin");

        var page = new Page({
          title: "Learning Content Management",
          showHeader: true,
          content: [tileBox]
        });

        new Shell({
          app: new App({ pages: [page] })
        }).placeAt("content");
      });
    });
  </script>
</head>
<body class="sapUiBody" id="content"></body>
</html>
